services:
  db:
    image: postgres:15-alpine
    container_name: weld-db
    environment:
      POSTGRES_DB: weld_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 512M

  ml-service:
    build: ./weld-ml-service
    container_name: weld-ml
    ports:
      - "8001:8001"
    volumes:
      - ./weld-ml-service/model:/app/model
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: weld-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/weld_control
      ML_SERVICE_URL: http://ml-service:8001
    volumes:
      - backend_logs:/app/logs
      - analysis_images:/app/analysis_images
      - reports:/app/reports
    depends_on:
      - db
      - ml-service
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: weld-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

volumes:
  db_data:
  backend_logs:
    driver: local
    driver_opts:
      type: none
      device: D:/docker/weld-control/logs
      o: bind
  analysis_images:
    driver: local
    driver_opts:
      type: none
      device: D:/docker/weld-control/images
      o: bind
  reports:
    driver: local
    driver_opts:
      type: none
      device: D:/docker/weld-control/reports
      o: bind